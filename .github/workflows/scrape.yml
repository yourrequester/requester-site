name: Scrape Requester Data

on:
  schedule:
    - cron: '0 8 * * *'   # every day at 8 AM UTC
  workflow_dispatch:          # allows manual run from GitHub Actions tab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node.js 24 for actions

permissions:
  contents: write          # allow git-auto-commit to push results

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt lxml

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC }}
          YOUTUBE_API_KEY:    ${{ secrets.YOUTUBE }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY:  ${{ secrets.SUPABASE_ANON_KEY }}
        run: python requester_phase1.py

      - name: Commit updated results
        uses: stefanzweifel/git-auto-commit-action@v5.0.1
        with:
          commit_message: "data: update scrape results [skip ci]"
          file_pattern: requester_results.json requester_history.json
          commit_user_name: "Requester Bot"
          commit_user_email: "bot@requester.org"
